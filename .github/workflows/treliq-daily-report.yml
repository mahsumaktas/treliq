name: Treliq Daily PR Report

on:
  schedule:
    # Run every morning at 08:00 UTC
    - cron: '0 8 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: read
  issues: write # Needed to create an issue report
  pull-requests: read

jobs:
  daily-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      
      - name: Install Treliq
        run: npm install -g treliq@latest
      
      - name: Check open PR count
        id: check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          PR_COUNT=$(gh pr list -R "$GH_REPO" --state open --json number --jq 'length')
          echo "pr_count=$PR_COUNT" >> "$GITHUB_OUTPUT"
          if [ "$PR_COUNT" -eq 0 ]; then
            echo "No open PRs — skipping report."
          fi

      - name: Generate PR Triage Report
        if: steps.check.outputs.pr_count != '0'
        id: triage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SCAN_REPO: ${{ github.repository }}
        run: |
          REPORT=$(treliq scan -r "$SCAN_REPO" -m 50 -f markdown)
          echo "REPORT<<EOF" >> "$GITHUB_OUTPUT"
          echo "$REPORT" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Post Daily Triage Issue
        if: steps.check.outputs.pr_count != '0'
        uses: actions/github-script@v7
        env:
          REPORT_BODY: ${{ steps.triage.outputs.REPORT }}
        with:
          script: |
            const date = new Date().toISOString().split('T')[0];
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Daily PR Triage Report - ${date}`,
              body: process.env.REPORT_BODY,
              labels: ['triage', 'report']
            });
